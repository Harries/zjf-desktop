name: Tag Release Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  checks:
    name: Checks
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml

  build:
    name: Build ${{ matrix.name }} installer
    needs: checks
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            runner: macos-15-intel
            platform: macos
            rust-target: x86_64-apple-darwin
            bundles: dmg
            arch: x64
            artifact-name: zjf-desktop-macos-x64
          - name: macOS arm64
            runner: macos-15
            platform: macos
            rust-target: aarch64-apple-darwin
            bundles: dmg
            arch: arm64
            artifact-name: zjf-desktop-macos-arm64
          - name: Windows x64
            runner: windows-2025
            platform: windows
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            arch: x64
            artifact-name: zjf-desktop-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm tauri build --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundles }}

      - name: Collect macOS installer
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          dmg="$(find "src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg" -maxdepth 1 -name "*.dmg" -print -quit)"
          test -n "$dmg"
          cp "$dmg" "release-assets/zjf.ai.Desktop_${version}_${{ matrix.arch }}.dmg"

      - name: Collect Windows installers
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $bundleRoot = "src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $exe = Get-ChildItem "$bundleRoot/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $exe) { throw "NSIS installer was not found" }
          Copy-Item $exe.FullName "release-assets/zjf.ai.Desktop_${version}_${{ matrix.arch }}-setup.exe"

          $msi = Get-ChildItem "$bundleRoot/msi" -Filter "*.msi" | Select-Object -First 1
          if ($null -eq $msi) { throw "MSI installer was not found" }
          Copy-Item $msi.FullName "release-assets/zjf.ai.Desktop_${version}_${{ matrix.arch }}_en-US.msi"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: zjf.ai Desktop ${{ github.ref_name }}
          files: release-assets/**/*
          fail_on_unmatched_files: true
